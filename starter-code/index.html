<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="output.css">
  <script src="script.js" defer></script>
  <title>Frontend Mentor | Pomodoro app</title>
</head>

<body class="w-screen min-h-screen font-kumbh bg-[#1E213F] relative flex items-center justify-center group/settings">

  <!-- Settings page -->
  <div
    class="fixed inset-0 z-20 w-screenn min-h-screen bg-[#1E213F] flex items-center justify-center scale-0 opacity-0 group-[.isOpen]/settings:scale-100 group-[.isOpen]/settings:opacity-100 transition">

    <!-- settings container -->
    <div class="flex flex-col bg-white w-82 h-145.5 md:w-135 md:h-122 rounded-[15px]">
      <!-- header -->
      <header class="flex justify-between items-center max-w-full py-4 md:py-8 border-b border-gray-200">
        <h1 class="text-[28px] leading-[125%] tracking-[0px] font-bold ml-6">Settings</h1>
        <button id="close-settings">
          <svg class="mr-6 w-3 h-3 cursor-pointer transition" width="13" height="13" viewBox="0 0 13 13" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M12.7279 1.41421L11.3137 0L6.36396 4.94975L1.41421 0L0 1.41421L4.94975 6.36396L0 11.3137L1.41421 12.7279L6.36396 7.77817L11.3137 12.7279L12.7279 11.3137L7.77817 6.36396L12.7279 1.41421Z"
              fill="#1E213F" />
          </svg>
        </button>
        <!-- <img class="" src="./assets/icon-close.svg" alt=""> -->
      </header>
      <form id="form" class="relative w-70 md:w-117 mx-auto mt-6 flex flex-col gap-6">
        <!-- Time settings -->
        <div class="flex flex-col gap-4 pb-6 border-b border-gray-200">
          <h2 class="text-[11px] font-bold leading-[auto] tracking-[4.23px] text-center md:text-left uppercase">Time
            (Minutes)</h2>
          <div class="grid grid-cols-1 gap-2 md:grid-cols-3">
            <!-- form control timer -->
            <div class="grid grid-cols-2 md:grid-cols-1 md:gap-2 items-center">
              <p class="text-[12px] text-[#1E213F] leading-[125%] tracking-[0px]">pomodoro</p>
              <!-- Custom input -->
              <div class="w-full flex justify-between items-center px-4 py-3 bg-blue-50 rounded-[10px] overflow-hidden">
                <!-- Number Input -->
                <input type="number"
                  class="bg-transparent w-full text-[13px] leading-[125%] tracking-[5px] font-bold text-[#1E213F] text-left focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                  value="25" step="1" min="1" max="60">
                <!-- buttons -->
                <div class="flex flex-col text-right gap-2">
                  <!-- Increment Button -->
                  <button type="button" onclick="this.closest('div.w-full').querySelector('input').stepUp()"
                    class="px-3  transition-colors cursor-pointer group">
                    <svg width="14" height="7" viewBox="0 0 14 7" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path class="group-hover:stroke-[#1E213F] transition-colors"
                        d="M0.554688 5.20184L6.55469 1.20184L12.5547 5.20184" stroke="#BBBDCB" stroke-width="2" />
                    </svg>
                  </button>
                  <!-- Decrement Button -->
                  <button type="button" onclick="this.closest('div.w-full').querySelector('input').stepDown()"
                    class="px-3 transition-colors cursor-pointer group">
                    <svg width="14" height="7" viewBox="0 0 14 7" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path class="group-hover:stroke-[#1E213F] transition-colors"
                        d="M0.554688 0.832031L6.55469 4.83203L12.5547 0.832031" stroke="#BBBDCB" stroke-width="2" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
            <!-- form control short break -->
            <div class="grid grid-cols-2 md:grid-cols-1 md:gap-2 items-center">
              <p class="text-[12px] text-[#1E213F] leading-[125%] tracking-[0px]">short break</p>
              <!-- Custom input -->
              <div class="w-full flex justify-between items-center px-4 py-3 bg-blue-50 rounded-[10px] overflow-hidden">
                <!-- Number Input -->
                <input type="number"
                  class="bg-transparent w-full text-[13px] leading-[125%] tracking-[5px] font-bold text-[#1E213F] text-left focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                  value="5" step="5" min="5" max="15">
                <!-- buttons -->
                <div class="flex flex-col text-right gap-2">
                  <!-- Increment Button -->
                  <button type="button" onclick="this.closest('div.w-full').querySelector('input').stepUp()"
                    class="px-3  transition-colors cursor-pointer group">
                    <svg width="14" height="7" viewBox="0 0 14 7" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path class="group-hover:stroke-[#1E213F] transition-colors"
                        d="M0.554688 5.20184L6.55469 1.20184L12.5547 5.20184" stroke="#BBBDCB" stroke-width="2" />
                    </svg>
                  </button>
                  <!-- Decrement Button -->
                  <button type="button" onclick="this.closest('div.w-full').querySelector('input').stepDown()"
                    class="px-3 transition-colors cursor-pointer group">
                    <svg width="14" height="7" viewBox="0 0 14 7" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path class="group-hover:stroke-[#1E213F] transition-colors"
                        d="M0.554688 0.832031L6.55469 4.83203L12.5547 0.832031" stroke="#BBBDCB" stroke-width="2" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
            <!-- form control long break-->
            <div class="grid grid-cols-2 md:grid-cols-1 md:gap-2 items-center">
              <p class="text-[12px] text-[#1E213F] leading-[125%] tracking-[0px]">long break</p>
              <!-- Custom input -->
              <div class="w-full flex justify-between items-center px-4 py-3 bg-blue-50 rounded-[10px] overflow-hidden">
                <!-- Number Input -->
                <input type="number"
                  class="bg-transparent w-full text-[13px] leading-[125%] tracking-[5px] font-bold text-[#1E213F] text-left focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                  value="15" step="5" min="20" max="60" placeholder="15">
                <!-- buttons -->
                <div class="flex flex-col text-right gap-2">
                  <!-- Increment Button -->
                  <button type="button" onclick="this.closest('div.w-full').querySelector('input').stepUp()"
                    class="px-3  transition-colors cursor-pointer group">
                    <svg width="14" height="7" viewBox="0 0 14 7" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path class="group-hover:stroke-[#1E213F] transition-colors"
                        d="M0.554688 5.20184L6.55469 1.20184L12.5547 5.20184" stroke="#BBBDCB" stroke-width="2" />
                    </svg>
                  </button>
                  <!-- Decrement Button -->
                  <button type="button" onclick="this.closest('div.w-full').querySelector('input').stepDown()"
                    class="px-3 transition-colors cursor-pointer group">
                    <svg width="14" height="7" viewBox="0 0 14 7" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path class="group-hover:stroke-[#1E213F] transition-colors"
                        d="M0.554688 0.832031L6.55469 4.83203L12.5547 0.832031" stroke="#BBBDCB" stroke-width="2" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Font settings -->
        <div
          class="w-38 md:w-full mx-auto flex flex-col justify-center md:flex-row md:justify-between gap-4 pb-6 border-b border-gray-200">
          <h2
            class="flex items-center justify-center md:justify-start text-[11px] font-bold leading-[auto] tracking-[4.23px] uppercase">
            Font
          </h2>
          <div id="fonts" class="w-full flex justify-center gap-4 md:justify-end">
            <!-- font kumbh-->
            <button data-font="font-kumbh" type="button"
              class="isActive font-kumbh w-10 h-10 text-[16px] text-[#1E213F] leading-[125%] tracking-[0px] font-bold bg-blue-50 rounded-full cursor-pointer [.isActive]:bg-[#161932] [.isActive]:text-white">
              Aa
            </button>
            <!-- font roboto-->
            <button data-font="font-roboto" type="button"
              class="font-roboto w-10 h-10 text-[16px] text-[#1E213F] leading-[125%] tracking-[0px] font-regular bg-blue-50 rounded-full cursor-pointer [.isActive]:bg-[#161932] [.isActive]:text-white">
              Aa
            </button>
            <!-- font space -->
            <button data-font="font-space" type="button"
              class="font-space w-10 h-10 text-[16px] text-[#1E213F] leading-[125%] tracking-[0px] font-regular bg-blue-50 rounded-full cursor-pointer [.isActive]:bg-[#161932] [.isActive]:text-white">
              Aa
            </button>
          </div>

        </div>

        <!-- Color settings -->
        <div
          class="w-38 md:w-full mx-auto mb-14.5 md:mb-12.5 flex flex-col justify-center md:flex-row md:justify-between gap-4 border-b border-gray-200">
          <h2
            class="flex items-center justify-center md:justify-start text-[11px] font-bold leading-[auto] tracking-[4.23px] uppercase">
            Color
          </h2>
          <div id="colors" class="w-full flex justify-center gap-4 md:justify-end">
            <!-- color -->
            <button data-color="red-400" type="button"
              class="w-10 h-10 flex items-center justify-center rounded-full cursor-pointer bg-red-400 group isActive">
              <svg width="14" height="11" viewBox="0 0 14 11" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path class="opacity-0 group-[.isActive]:opacity-100"
                  d="M0.707031 5.20711L4.65966 9.15974L13.1123 0.707108" stroke="#161932" stroke-width="2" />
              </svg>
            </button>
            <!-- color -->
            <button data-color="cyan-300" type="button"
              class="w-10 h-10 flex items-center justify-center rounded-full cursor-pointer bg-cyan-300 group">
              <svg width="14" height="11" viewBox="0 0 14 11" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path class="opacity-0 group-[.isActive]:opacity-100"
                  d="M0.707031 5.20711L4.65966 9.15974L13.1123 0.707108" stroke="#161932" stroke-width="2" />
              </svg>
            </button>
            <!-- color -->
            <button data-color="purple-400" type="button"
              class="w-10 h-10 flex items-center justify-center rounded-full cursor-pointer bg-purple-400 group">
              <svg width="14" height="11" viewBox="0 0 14 11" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path class="opacity-0 group-[.isActive]:opacity-100"
                  d="M0.707031 5.20711L4.65966 9.15974L13.1123 0.707108" stroke="#161932" stroke-width="2" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Apply button -->
        <Button id="apply-btn"
          class="absolute left-1/2 -translate-x-1/2 -bottom-6.5 md:-bottom-15 text-[16px] text-white leading-[125%] tracking-[0px] font-bold flex items-center justify-center w-35 h-13.5 bg-red-400 rounded-[26.5px] cursor-pointer">Apply</Button>
      </form>
    </div>

  </div>

  <!-- Main page -->
  <div class="flex flex-col w-full gap-12 md:gap-27 lg:gap-9">
    <!-- Header -->
    <div class="flex flex-col mx-auto gap-10 md:gap-12 lg:gap-14 w-82.5 md:w-95">
      <!-- logo -->
      <button id="pomodoro" class="flex justify-center h-7.5 md:h-10 cursor-pointer group">
        <!-- <img class=" " src="./assets/logo.svg" alt=""> -->
        <svg class="w-39 md:w-45" width="154" height="32" viewBox="0 0 154 32" fill="none"
          xmlns="http://www.w3.org/2000/svg">
