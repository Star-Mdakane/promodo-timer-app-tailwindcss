<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="output.css" .css">
  <script src="script.js" defer></script>
  <title>Frontend Mentor | Pomodoro app</title>
</head>

<body class="w-screen min-h-screen font-kumbh bg-[#1E213F] relative flex items-center justify-center group/settings">
  <!-- Main page -->
  <div class="flex flex-col w-full gap-12 md:gap-27 lg:gap-9">
    <!-- Header -->
    <div class="flex flex-col mx-auto gap-10 md:gap-12 lg:gap-14 w-82.5 md:w-95">
      <!-- logo -->
      <div class="flex justify-center h-7.5 md:h-10">
        <img class="w-39 md:w-45" src="./assets/logo.svg" alt="">
      </div>
      <!-- Timer options -->
      <div class="grid grid-cols-3 w-full bg-blue-900 rounded-4xl h-16 items-center justify-items-center gap-2 p-2">
        <button
          class="font-bold w-full text-[14px] leading-[120%] tracking-[0px] text-blue-100/40 isActive [.isActive]:bg-red-400 [.isActive]:text-[#1E213F] rounded-3xl h-12">
          pomodoro
        </button>
        <button
          class="font-bold w-full text-[14px] leading-[120%] tracking-[0px] text-blue-100/40 [.isActive]:bg-red-400 [.isActive]:text-[#1E213F] rounded-3xl h-12">
          short break
        </button>
        <button
          class="font-bold w-full text-[14px] leading-[120%] tracking-[0px] text-blue-100/40 [.isActive]:bg-red-400 [.isActive]:text-[#1E213F] rounded-3xl h-12">
          long break
        </button>
      </div>
    </div>

    <!-- Timer Container -->
    <div class="flex flex-col gap-20 md:justify-between lg:justify-center lg:gap-16 mx-auto w-75 md:w-102.5">
      <!-- Timer -->
      <div id="progress-container" class="relative w-75 h-75 md:w-102.5 md:h-102.5 flex justify-center items-center">
        <div id="outer"
          class="grid place-content-center w-75 h-75 md:w-102.5 md:h-102.5 rounded-full shadow-[-50px_-50px_100px_0_#272C5A,50px_50px_100px_0_#121530] bg-[conic-gradient(#2E325A_0%,#0E112A_55%_93%,#2E325A_100%)]">
          <div id="inner" class=" w-67 h-67 md:w-84 md:h-84 bg-[#161932] rounded-full flex items-center justify-center">
            <div class="flex flex-col">
              <!-- Time -->
              <div id="time"
                class="text-[80px] md:text-[100px] text-blue-100 leading-[120%] md:leading-[125%] tracking-[-10px] md:tracking-[-5px] font-bold">
                00 : 00
              </div>
              <!-- Restart -->
              <button id="toggle-start"
                class="text-[14px] md:text-[16px] text-blue-100 leading-[120%] md:leading-[125%] tracking-[13px] md:tracking-[15px] font-bold uppercase cursor-pointer">
                Pause
              </button>
            </div>
          </div>
        </div>
        <svg class="absolute w-62.5 h-62.5 md:w-85 md:h-85 inline-block transition-all" width="250" height="250"
          class="inline-block">
          <circle cx="50%" cy="50%" r="45%" fill="none" stroke="currentColor" stroke-width="8"
            class="text-[#F87070] progress-circle origin-center -rotate-90 transition-all duration-1000"
            stroke-linecap="round" id="svg-circle" />
        </svg>
      </div>

      <!-- Settings -->
      <button class="w-full h-7 flex justify-center cursor-pointer">
        <img src="./assets/icon-settings.svg" alt="">
      </button>
    </div>
  </div>


  <!-- Settings page -->







  <!-- pomodoro
  short break
  long break

  start 
  pause
  restart

  Settings

  Time (minutes)
  pomodoro
  short break
  long break

  Font
  Color

  Apply -->
</body>

</html>
