<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="output.css" .css">
  <script src="script.js" defer></script>
  <title>Frontend Mentor | Pomodoro app</title>
</head>

<body class="w-screen min-h-screen font-kumbh bg-[#1E213F] relative flex items-center justify-center group/settings">

  <!-- Settings page -->
  <div class="fixed inset-0 z-10 w-screenn min-h-screen bg-[#1E213F] flex items-center justify-center">
    <div class="flex flex-col bg-white w-82 h-137.5 md:w-135 md:h-116 rounded-[15px]">
      <!-- header -->
      <header class="flex justify-between items-center max-w-full py-4 md:py-8 border-b border-gray-200">
        <h1 class="text-[28px] leading-[125%] tracking-[0px] font-bold ml-6">Settings</h1>
        <button>
          <svg class="mr-6 w-3 h-3 cursor-pointer" width="13" height="13" viewBox="0 0 13 13" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M12.7279 1.41421L11.3137 0L6.36396 4.94975L1.41421 0L0 1.41421L4.94975 6.36396L0 11.3137L1.41421 12.7279L6.36396 7.77817L11.3137 12.7279L12.7279 11.3137L7.77817 6.36396L12.7279 1.41421Z"
              fill="#1E213F" />
          </svg>
        </button>
        <!-- <img class="" src="./assets/icon-close.svg" alt=""> -->
      </header>
      <form id="form" class="relative w-70 md:w-117 mx-auto mt-6 flex flex-col gap-6">
        <!-- Time settings -->
        <div class="flex flex-col gap-4 pb-6 border-b border-gray-200">
          <h2 class="text-[11px] font-bold leading-[auto] tracking-[4.23px] text-center md:text-left uppercase">Time
            (Minutes)</h2>
          <div class="grid grid-cols-1 gap-2 md:grid-cols-3">
            <!-- form control timer -->
            <div class="grid grid-cols-2 md:grid-cols-1 md:gap-2 items-center">
              <p class="text-[12px] text-[#1E213F] leading-[125%] tracking-[0px]">promodoro</p>
              <!-- Custom input -->
              <div class="w-full flex justify-between items-center px-4 py-3 bg-blue-50 rounded-[10px] overflow-hidden">
                <!-- Number Input -->
                <input type="number"
                  class="bg-transparent w-full text-[13px] leading-[125%] tracking-[5px] font-bold text-[#1E213F] text-left focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                  value="25" step="1" min="1" max="60">
                <!-- buttons -->
                <div class="flex flex-col text-right gap-2">
                  <!-- Increment Button -->
                  <button type="button" onclick="this.closest('div.w-full').querySelector('input').stepUp()"
                    class="px-3  transition-colors cursor-pointer group">
                    <svg width="14" height="7" viewBox="0 0 14 7" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path class="group-hover:stroke-[#1E213F] transition-colors"
                        d="M0.554688 5.20184L6.55469 1.20184L12.5547 5.20184" stroke="#BBBDCB" stroke-width="2" />
                    </svg>
                  </button>
                  <!-- Decrement Button -->
                  <button type="button" onclick="this.closest('div.w-full').querySelector('input').stepDown()"
                    class="px-3 transition-colors cursor-pointer group">
                    <svg width="14" height="7" viewBox="0 0 14 7" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path class="group-hover:stroke-[#1E213F] transition-colors"
                        d="M0.554688 0.832031L6.55469 4.83203L12.5547 0.832031" stroke="#BBBDCB" stroke-width="2" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
            <!-- form control short break -->
            <div class="grid grid-cols-2 md:grid-cols-1 md:gap-2 items-center">
              <p class="text-[12px] text-[#1E213F] leading-[125%] tracking-[0px]">short break</p>
              <!-- Custom input -->
              <div class="w-full flex justify-between items-center px-4 py-3 bg-blue-50 rounded-[10px] overflow-hidden">
                <!-- Number Input -->
                <input type="number"
                  class="bg-transparent w-full text-[13px] leading-[125%] tracking-[5px] font-bold text-[#1E213F] text-left focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                  value="5" step="5" min="5" max="15">
                <!-- buttons -->
                <div class="flex flex-col text-right gap-2">
                  <!-- Increment Button -->
                  <button type="button" onclick="this.closest('div.w-full').querySelector('input').stepUp()"
                    class="px-3  transition-colors cursor-pointer group">
                    <svg width="14" height="7" viewBox="0 0 14 7" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path class="group-hover:stroke-[#1E213F] transition-colors"
                        d="M0.554688 5.20184L6.55469 1.20184L12.5547 5.20184" stroke="#BBBDCB" stroke-width="2" />
                    </svg>
                  </button>
                  <!-- Decrement Button -->
                  <button type="button" onclick="this.closest('div.w-full').querySelector('input').stepDown()"
                    class="px-3 transition-colors cursor-pointer group">
                    <svg width="14" height="7" viewBox="0 0 14 7" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path class="group-hover:stroke-[#1E213F] transition-colors"
                        d="M0.554688 0.832031L6.55469 4.83203L12.5547 0.832031" stroke="#BBBDCB" stroke-width="2" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
            <!-- form control long break-->
            <div class="grid grid-cols-2 md:grid-cols-1 md:gap-2 items-center">
              <p class="text-[12px] text-[#1E213F] leading-[125%] tracking-[0px]">long break</p>
              <!-- Custom input -->
              <div class="w-full flex justify-between items-center px-4 py-3 bg-blue-50 rounded-[10px] overflow-hidden">
                <!-- Number Input -->
                <input type="number"
                  class="bg-transparent w-full text-[13px] leading-[125%] tracking-[5px] font-bold text-[#1E213F] text-left focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                  value="15" step="5" min="20" max="60" placeholder="15">
                <!-- buttons -->
                <div class="flex flex-col text-right gap-2">
                  <!-- Increment Button -->
                  <button type="button" onclick="this.closest('div.w-full').querySelector('input').stepUp()"
                    class="px-3  transition-colors cursor-pointer group">
                    <svg width="14" height="7" viewBox="0 0 14 7" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path class="group-hover:stroke-[#1E213F] transition-colors"
                        d="M0.554688 5.20184L6.55469 1.20184L12.5547 5.20184" stroke="#BBBDCB" stroke-width="2" />
                    </svg>
                  </button>
                  <!-- Decrement Button -->
                  <button type="button" onclick="this.closest('div.w-full').querySelector('input').stepDown()"
                    class="px-3 transition-colors cursor-pointer group">
                    <svg width="14" height="7" viewBox="0 0 14 7" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path class="group-hover:stroke-[#1E213F] transition-colors"
                        d="M0.554688 0.832031L6.55469 4.83203L12.5547 0.832031" stroke="#BBBDCB" stroke-width="2" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Font settings -->
        <div class="flex flex-col gap-4 pb-6 border-b border-gray-200">
          <h2 class="text-[11px] font-bold leading-[auto] tracking-[4.23px] text-center md:text-left uppercase">Font
          </h2>
          <div class="flex flex-col md:flex-row">
            <!-- form control timer -->
            <!-- form control long break -->
            <!-- form control short break-->
          </div>
        </div>

        <!-- Color settings -->
        <div class="flex flex-col gap-4">
          <h2 class="text-[11px] font-bold leading-[auto] tracking-[4.23px] text-center md:text-left uppercase">Color
          </h2>
          <div class="flex flex-col md:flex-row">
            <!-- form control timer -->
            <!-- form control long break -->
            <!-- form control short break-->
          </div>
        </div>

        <!-- Apply button -->
        <Button>Apply</Button>
      </form>
    </div>

  </div>

  <!-- Main page -->
  <div class="flex flex-col w-full gap-12 md:gap-27 lg:gap-9">
    <!-- Header -->
    <div class="flex flex-col mx-auto gap-10 md:gap-12 lg:gap-14 w-82.5 md:w-95">
      <!-- logo -->
      <div class="flex justify-center h-7.5 md:h-10">
        <img class="w-39 md:w-45" src="./assets/logo.svg" alt="">
      </div>
      <!-- Timer options -->
      <div class="grid grid-cols-3 w-full bg-blue-900 rounded-4xl h-16 items-center justify-items-center gap-2 p-2">
        <button
          class="font-bold w-full text-[14px] leading-[120%] tracking-[0px] text-blue-100/40 isActive [.isActive]:bg-red-400 [.isActive]:text-[#1E213F] rounded-3xl h-12">
          pomodoro
        </button>
        <button
          class="font-bold w-full text-[14px] leading-[120%] tracking-[0px] text-blue-100/40 [.isActive]:bg-red-400 [.isActive]:text-[#1E213F] rounded-3xl h-12">
          short break
        </button>
        <button
          class="font-bold w-full text-[14px] leading-[120%] tracking-[0px] text-blue-100/40 [.isActive]:bg-red-400 [.isActive]:text-[#1E213F] rounded-3xl h-12">
          long break
        </button>
      </div>
    </div>

    <!-- Timer Container -->
    <div class="flex flex-col gap-20 md:justify-between lg:justify-center lg:gap-16 mx-auto w-75 md:w-102.5">
      <!-- Timer -->
      <div id="progress-container" class="relative w-75 h-75 md:w-102.5 md:h-102.5 flex justify-center items-center">
        <div id="outer"
          class="grid place-content-center w-75 h-75 md:w-102.5 md:h-102.5 rounded-full shadow-[-50px_-50px_100px_0_#272C5A,50px_50px_100px_0_#121530] bg-[conic-gradient(#2E325A_0%,#0E112A_55%_93%,#2E325A_100%)]">
          <div id="inner" class=" w-67 h-67 md:w-84 md:h-84 bg-[#161932] rounded-full flex items-center justify-center">
            <div class="flex flex-col">
              <!-- Time -->
              <div id="time"
                class="text-[80px] md:text-[100px] text-blue-100 leading-[120%] md:leading-[125%] tracking-[-10px] md:tracking-[-5px] font-bold">
                00 : 00
              </div>
              <!-- Restart -->
              <button id="toggle-start"
                class="text-[14px] md:text-[16px] text-blue-100 leading-[120%] md:leading-[125%] tracking-[13px] md:tracking-[15px] font-bold uppercase cursor-pointer">
                Pause
              </button>
            </div>
          </div>
        </div>
        <svg class="absolute w-62.5 h-62.5 md:w-85 md:h-85 inline-block transition-all" viewBox="0 0 100 100"
          width="250" height="250">
          <circle cx="50%" cy="50%" r="45%" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="282.74"
            stroke-dashoffset="282.74"
            class="text-[#F87070] progress-circle origin-center -rotate-90 transition-all duration-1000"
            stroke-linecap="round" id="svg-circle" />
        </svg>
      </div>

      <!-- Settings -->
      <button class="w-full h-7 flex justify-center cursor-pointer">
        <img src="./assets/icon-settings.svg" alt="">
      </button>
    </div>
  </div>


  <!-- Settings page -->

  Apply -->
</body>

</html>
