<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="output.css" .css">
  <script src="script.js" defer></script>
  <title>Frontend Mentor | Pomodoro app</title>
</head>

<body class="w-screen min-h-screen font-kumbh bg-[#1E213F] relative flex items-center justify-center group/settings">
  <!-- Main page -->
  <div class="flex flex-col w-full gap-12 md:gap-27 lg:gap-9">
    <!-- Header -->
    <div class="flex flex-col mx-auto gap-10 md:gap-12 lg:gap-14 w-82.5 md:w-95">
      <!-- logo -->
      <div class="flex justify-center h-7.5 md:h-10">
        <img class="w-39 md:w-45" src="./assets/logo.svg" alt="">
      </div>
      <!-- Timer options -->
      <div class="grid grid-cols-3 w-full bg-blue-900 rounded-4xl h-16 items-center justify-items-center gap-2 p-2">
        <button
          class="font-bold w-full text-[14px] leading-[120%] tracking-[0px] text-blue-100/40 isActive [.isActive]:bg-red-400 [.isActive]:text-[#1E213F] rounded-3xl h-12">
          pomodoro
        </button>
        <button
          class="font-bold w-full text-[14px] leading-[120%] tracking-[0px] text-blue-100/40 [.isActive]:bg-red-400 [.isActive]:text-[#1E213F] rounded-3xl h-12">
          short break
        </button>
        <button
          class="font-bold w-full text-[14px] leading-[120%] tracking-[0px] text-blue-100/40 [.isActive]:bg-red-400 [.isActive]:text-[#1E213F] rounded-3xl h-12">
          long break
        </button>
      </div>
    </div>

    <!-- Timer Container -->
    <div
      class="flex flex-col gap-20 md:justify-between lg:justify-center lg:gap-16 mx-auto w-75 md:w-102.5 outline outline-amber-50">
      <!-- Timer -->
      <div class="flex w-full justify-center items-center bg-red-500 rounded-full">
        <div id="progress-container" class="w-full h-75">
          <svg width="100" height="100" class="inline-block">
            <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="8" class="text-gray-200" />
            <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="8" stroke-dasharray="251.2"
              stroke-dashoffset="251.2"
              class="text-lime-300 progress-circle origin-center -rotate-90 transition-all duration-1000"
              stroke-linecap="round" />
          </svg>
        </div>
      </div>
      <!-- Settings -->
      <button class="w-full h-7 flex justify-center">
        <img src="./assets/icon-settings.svg" alt="">
      </button>
    </div>
  </div>


  <!-- Settings page -->

  Apply -->
</body>

</html>
